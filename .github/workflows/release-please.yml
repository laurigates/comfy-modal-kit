name: "Release: release-please"

on:
  push:
    branches:
      - main
  # Allow manual triggering, e.g. after a stale release PR is closed.
  workflow_dispatch: {}

# Prevent concurrent runs from racing on the release-please branch.
concurrency:
  group: release-please-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

  publish:
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing
    uses: laurigates/.github/.github/workflows/reusable-npm-publish.yml@main
    with:
      node-version: "22"
